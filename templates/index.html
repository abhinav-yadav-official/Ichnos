{{define "index.html"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ichnos Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiBmaWxsPSIjMGYxNzJhIiBzdHJva2U9IiMzOGJkZjgiIHN0cm9rZS13aWR0aD0iMiIvPjx0ZXh0IHg9IjMyIiB5PSI0MyIgZm9udC1mYW1pbHk9InN5c3RlbS11aSwtYXBwbGUtc3lzdGVtLHNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSI4MDAiIGZvbnQtc2l6ZT0iMjYiIGZpbGw9IiMzOGJkZjgiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkljPC90ZXh0Pjwvc3ZnPg==">
  <link rel="apple-touch-icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiBmaWxsPSIjMGYxNzJhIiBzdHJva2U9IiMzOGJkZjgiIHN0cm9rZS13aWR0aD0iMiIvPjx0ZXh0IHg9IjMyIiB5PSI0MyIgZm9udC1mYW1pbHk9InN5c3RlbS11aSwtYXBwbGUtc3lzdGVtLHNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSI4MDAiIGZvbnQtc2l6ZT0iMjYiIGZpbGw9IiMzOGJkZjgiIHRleHQtYW5jaG9yPSJtaWRkbGUiPkljPC90ZXh0Pjwvc3ZnPg==">
  <style>
    .htmx-indicator {
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .htmx-request .htmx-indicator,
    .htmx-indicator.htmx-request {
      opacity: 1;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    #results > div > article {
      animation: fade-in 0.25s ease-out both;
    }
    #results > div > article:nth-child(2) { animation-delay: 30ms; }
    #results > div > article:nth-child(3) { animation-delay: 60ms; }
    #results > div > article:nth-child(4) { animation-delay: 90ms; }
    #results > div > article:nth-child(5) { animation-delay: 120ms; }
    #results > div > article:nth-child(6) { animation-delay: 150ms; }
    #results > div > article:nth-child(7) { animation-delay: 180ms; }
    #results > div > article:nth-child(8) { animation-delay: 210ms; }
    #results > div > article:nth-child(9) { animation-delay: 240ms; }
    #results > div > article:nth-child(10) { animation-delay: 270ms; }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 0.375rem;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    *:focus-visible { outline: 2px solid #38bdf8; outline-offset: 2px; border-radius: 2px; }
    mark {
      background: rgba(56, 189, 248, 0.15);
      color: #7dd3fc;
      border-radius: 2px;
      padding: 0 2px;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto flex min-h-screen w-full max-w-5xl flex-col px-4 py-8 sm:px-6 lg:px-8">
    <header class="mb-8 flex flex-col gap-1 border-b border-slate-800 pb-6">
      <div class="flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="h-9 w-9" aria-hidden="true">
          <rect width="32" height="32" fill="#0f172a" stroke="#38bdf8" stroke-width="1.5"/>
          <text x="16" y="22" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="13" fill="#38bdf8" text-anchor="middle">Ic</text>
        </svg>
        <div>
          <h1 class="text-2xl font-semibold tracking-normal text-slate-100">Ichnos</h1>
          <p class="text-sm text-slate-400">A simple search engine</p>
        </div>
      </div>
    </header>

    <form class="grid gap-4 rounded-xl border border-slate-800 bg-slate-900/80 p-5 shadow-lg shadow-sky-950/20 backdrop-blur-sm sm:grid-cols-[minmax(0,1fr)_14rem]" hx-get="{{.BasePath}}/search" hx-target="#results" hx-indicator="#search-spinner">
      <label class="flex flex-col gap-1.5 text-sm font-medium text-slate-300">
        <span>Search</span>
        <div class="flex gap-2">
          <div class="relative flex-1">
            <input
              class="peer h-11 w-full rounded-lg border border-slate-700 bg-slate-800/80 pl-10 pr-3 text-base font-normal text-slate-100 placeholder-slate-500 outline-none ring-sky-500 transition-shadow focus:ring-2"
              type="search"
              name="q"
              autocomplete="off"
              placeholder="golang">
            <svg class="pointer-events-none absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
          </div>
          <button type="submit" class="flex h-11 shrink-0 items-center gap-2 rounded-lg border border-sky-500/50 bg-sky-500/10 px-4 text-sm font-medium text-sky-400 transition-colors hover:bg-sky-500/20 focus-visible:outline-2 focus-visible:outline-sky-400">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
            Search
          </button>
        </div>
      </label>

      <label class="flex flex-col gap-1.5 text-sm font-medium text-slate-300">
        <span>Domain</span>
        <select
          class="h-11 w-full rounded-lg border border-slate-700 bg-slate-800/80 px-3 text-base font-normal text-slate-100 outline-none ring-sky-500 transition-shadow focus:ring-2"
          name="domain">
          <option value="">All domains</option>
          <option value="go.dev">go.dev</option>
          <option value="github.com">github.com</option>
          <option value="pkg.go.dev">pkg.go.dev</option>
          <option value="hachyderm.io">hachyderm.io</option>
          <option value="news.ycombinator.com">news.ycombinator.com</option>
        </select>
      </label>
    </form>

    <div id="search-spinner" class="htmx-indicator mt-4 flex items-center justify-center gap-2 text-sm text-sky-400">
      <svg class="h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
      </svg>
      <span>Searching…</span>
    </div>

    <section id="results" class="mt-5" aria-live="polite">
      {{template "results.html" .}}
    </section>
  </main>
</body>
</html>
{{end}}
