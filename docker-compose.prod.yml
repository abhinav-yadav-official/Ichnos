services:
  crawler:
    build:
      context: .
      dockerfile: docker/crawler.Dockerfile
    env_file: .env.prod
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    extra_hosts:
      - "redis:172.18.0.10"
      - "opensearch:172.18.0.11"
    entrypoint:
      - sh
      - -c
      - echo 'nameserver 8.8.8.8' > /etc/resolv.conf && exec /crawler

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env.prod
    environment:
      - BASE_PATH=/ichnos
    ports:
      - "127.0.0.1:8086:8080"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      opensearch:
        condition: service_healthy
    extra_hosts:
      - "redis:172.18.0.10"
      - "opensearch:172.18.0.11"
    entrypoint:
      - sh
      - -c
      - echo 'nameserver 8.8.8.8' > /etc/resolv.conf && exec /api

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 172.18.0.10

  opensearch:
    image: opensearchproject/opensearch:2.9.0
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_PASSWORD}
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks:
      default:
        ipv4_address: 172.18.0.11

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/alerts.yml:/etc/prometheus/alerts.yml:ro
    restart: unless-stopped
    depends_on:
      - api
      - crawler

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SERVER_ROOT_URL=https://abhiyadav.in/ichnos/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  redis-data:
  opensearch-data:
  grafana-data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16
