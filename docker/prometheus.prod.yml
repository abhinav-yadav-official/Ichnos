global:
  scrape_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: ichnos-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080

  - job_name: ichnos-crawler
    metrics_path: /metrics
    static_configs:
      - targets:
          - crawler:6060
